name: Update Leaderboard

on:
  pull_request_target:
    types: [opened, synchronize]
    # Removed the 'paths' filter to ensure it triggers more reliably

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Run Evaluation
        env:
          FLOWER_ANSWERS: ${{ secrets.FLOWER_ANSWERS }} 
        run: python evaluate.py ${{ github.event.pull_request.user.login }}

      - name: Commit and Push Leaderboard Update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Leaderboard Bot"
          # CRITICAL: Added README.md here so the table actually updates on GitHub!
          git add scores.json README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏆 Update leaderboard for ${{ github.event.pull_request.user.login }}" && git push)
