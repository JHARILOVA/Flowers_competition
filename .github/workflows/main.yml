name: Update Leaderboard

on:
  push:
    paths:
      - 'scores.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This fixes the "exit code 128" permission issue
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Fixed the 'python-data' typo here

      - name: Run update script
        run: python leaderboard/update.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard/README.md
          git commit -m "Leaderboard update: ${{ github.actor }}" || exit 0
          git push
